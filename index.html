<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <script src="js/main.js" defer></script>
  <title>Sistema de Vendas - Vanilla JS</title>
</head>

<body>
  <header class="header">
    <div class="logo">
      <img src="" alt="Logo">
      <h1>Sistema de vendas</h1>
    </div>
    <div class="user-info">
      <img src="" alt="Avatar">
      <span>Nome Usuário</span>
    </div>
  </header>
  <aside class="menu">
    <nav>
      <ul>
        <li>Dashboard</li>
        <li>Produtos</li>
        <li>Carrinho</li>
        <li>Configurações</li>
      </ul>
    </nav>
  </aside>
  <main>
    <div id="dashboard">
      dashboard aqui
    </div>
    <div id="products">
      <section id="product-regitration">
        <form action="" id="product-form">
          <fieldset>
            <legend>Adicionar Produto</legend>

            <label for="name">Nome</label>
            <input type="text" name="name" id="product-name" required>

            <label for="description">Descrição</label>
            <input type="text" name="description" id="product-description">

            <label for="cost">Custo</label>
            <input type="number" name="cost" id="product-cost" step="0.01" required>

            <label for="price">Preço</label>
            <input type="number" name="price" id="product-price" step="0.01" required>

            <input type="submit" value="Salvar" id="product-submit">

          </fieldset>
        </form>
      </section>
      <section id="product-list">
        <table id="product-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Nome</th>
              <th>Descrição</th>
              <th>Custo</th>
              <th>Preço</th>
              <th colspan="2">Ações</th>
            </tr>
          </thead>
          <tbody>
          </tbody>
        </table>
      </section>
    </div>
    <div id="cart">
      <section id="shopping-cart">
        <table id="cart-items-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Nome</th>
              <th>Qtd</th>
              <th>Preço Uni.</th>
              <th>Total</th>
              <th colspan="2">Ações</th>
            </tr>
          </thead>
          <tbody>
          </tbody>
        </table>
      </section>
    </div>
  </main>
  <footer>
    Sistema de Vendas. Todos os direitos reservados
  </footer>
</body>

</html>
