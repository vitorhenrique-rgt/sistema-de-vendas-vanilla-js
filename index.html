<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <script src="js/main.js" defer></script>
  <title>Sistema de Vendas - Vanilla JS</title>
</head>

<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <h1>Vanilla JS</h1>
        <p>Sistema de vendas</p>
      </div>
      <nav class="sidebar-menu">
        <a href="#" class="menu-item">Dashboard</a>
        <a href="#" class="menu-item active">Produtos</a>
        <a href="#" class="menu-item">Carrinho</a>
        <a href="#" class="menu-item">Configurações</a>
      </nav>
    </aside>
    <div class="main-wrapper">
      <header class="header">
        <div class="header-content">
          <p class="h4">Produtos</p>
          <div class="header-actions">
            <div class="avatar">U</div>
            <span>Usuário</span>
          </div>
        </div>
      </header>
      <main class="main-content container">
        <div id="dashboard">
        </div>

        <div id="products">
          <section class="section-block" id="product-registration">
            <div class="card">
              <div class="card-header">
                <p class="h5">Novo Produto</p>
              </div>
              <div class="card-body">
                <form class="form-grid" action="" id="product-form">
                  <div class="form-group">
                    <label class="form-label" for="product-name">Nome</label>
                    <input class="form-control" type="text" name="name" id="product-name" required>
                  </div>
                  <div class="form-group">
                    <label class="form-label" for="product-description">Descrição</label>
                    <input class="form-control" type="text" name="description" id="product-description">
                  </div>
                  <div class="form-group">
                    <label class="form-label" for="product-cost">Custo</label>
                    <input class="form-control" type="number" name="cost" id="product-cost" step="0.01" required>
                  </div>
                  <div class="form-group">
                    <label class="form-label" for="product-price">Preço</label>
                    <input class="form-control" type="number" name="price" id="product-price" step="0.01" required>
                  </div>
                  <div class="form-group full-width">
                    <div class="divider"></div>
                    <input class="btn btn-primary" type="submit" value="Salvar" id="product-submit">
                  </div>
                </form>
              </div>
            </div>
          </section>
          <br>
          <section class="section-block" id="product-list">
            <div class="card">
              <div class="table-responsive">
                <table class="table" id="product-table">
                  <thead>
                    <tr>
                      <th>#</th>
                      <th>Nome</th>
                      <th>Descrição</th>
                      <th>Custo</th>
                      <th>Preço</th>
                      <th colspan="3">Ações</th>
                    </tr>
                  </thead>
                  <tbody>
                  </tbody>
                </table>
              </div>
            </div>
          </section>
        </div>
        <br>
        <div id="cart">
          <section class="section-block" id="shopping-cart">
            <div class="card">
              <div class="table-responsive">
                <table class="table" id="cart-items-table" style="border-collapse: collapse; max-width: 100%;">
                  <thead>
                    <tr>
                      <th>#</th>
                      <th>Nome</th>
                      <th>Qtd</th>
                      <th>Preço Uni.</th>
                      <th>Total</th>
                      <th colspan="2">Ações</th>
                    </tr>
                  </thead>
                  <tbody>
                  </tbody>
                  <tfoot>
                  </tfoot>
                </table>
              </div>
            </div>
          </section>
        </div>
        <br>
      </main>
      <footer class="footer">
        <div class="container text-center text-sm text-muted">
          &copy; 2026 Vanilla JS - Sistema de Vendas. Todos os direitos reservados.
        </div>
      </footer>
    </div>
  </div>
</body>

</html>
